<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 B · 暖咖 · 流量时间放大</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;font-family:Georgia,serif;color:#ccc;padding:32px;display:flex;flex-direction:column;align-items:center;gap:24px}
h1{font-size:15px;font-weight:400;color:#777;letter-spacing:.08em}
h1 strong{color:#eee;font-weight:500}
.sub{font-size:11px;color:#555;font-style:italic}
.card{background:#14141e;border-radius:12px;padding:24px 20px 16px;border:1px solid #2a2a35;display:flex;flex-direction:column;align-items:center;gap:14px}
.card-header{display:flex;justify-content:space-between;width:100%;align-items:center}
.card-header .name{font-size:13px;font-weight:500;color:#D4A574;letter-spacing:.03em;font-family:Georgia,serif}
.card-header .tags{display:flex;gap:6px}
.card-header .tags span{font-size:9px;padding:2px 8px;border-radius:4px;background:#1e1e2a;color:#666;font-family:system-ui,sans-serif}
.screen-box{width:240px;height:135px;border-radius:4px;border:2px solid #2a2a35;overflow:hidden;background:#24140D;display:block}
.screen-box svg{display:block}
.pages{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.pages .btn{font-size:10px;padding:5px 12px;border-radius:6px;border:1px solid #2a2a35;background:transparent;color:#555;cursor:pointer;transition:.12s;font-family:Georgia,serif}
.pages .btn:hover{color:#aaa;border-color:#D4A574}
.pages .btn.active{background:#D4A574;border-color:#D4A574;color:#1a1a1a;font-weight:700}
</style>
</head>
<body>
<h1>方案 B · <strong>暖咖氛围</strong> · 流量时间放大</h1>
<p class="sub">240×135 · flow/time 18pt · BREWING 12pt · 曲线 2px 流畅线条</p>

<div class="card">
  <div class="card-header">
    <div class="name">☕ Pour Over Scale</div>
    <div class="tags"><span>Georgia Serif</span><span>FreeSerif18pt</span></div>
  </div>
  <div class="screen-box" id="screenB"></div>
  <div class="pages" id="pageBtns">
    <div class="btn active" onclick="showPage(0)">主界面</div>
    <div class="btn" onclick="showPage(1)">重量曲线</div>
    <div class="btn" onclick="showPage(2)">流量曲线</div>
    <div class="btn" onclick="showPage(3)">设置</div>
  </div>
</div>

<script>
const W=240, H=135;
const D = {weight:187.3, flow:4.2, m:1, s:23, running:true};
const FF = 'font-family="Georgia, serif"';

function main() {
  let w=D.weight, f=D.flow;
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect width="${W}" height="${H}" fill="#24140D"/>
    <rect x="0" y="0" width="${W}" height="18" fill="#1A0D08"/>
    <text x="120" y="12" text-anchor="middle" fill="#D4A574" font-size="9" letter-spacing="1.5" ${FF}>POUR OVER</text>
    <circle cx="210" cy="9" r="2.5" fill="#D4A574"/>
    <circle cx="222" cy="9" r="2.5" fill="#5A4A3A"/>
    <circle cx="234" cy="9" r="2.5" fill="#5A4A3A"/>
    <line x1="0" y1="18" x2="240" y2="18" stroke="#D4A574" stroke-width="2" opacity="0.35"/>
    <line x1="0" y1="19" x2="240" y2="19" stroke="#1A0D08" stroke-width="1"/>
    <text x="120" y="52" text-anchor="middle" fill="#F5E6D0" font-size="30" font-weight="700" ${FF}>${w.toFixed(1)}</text>
    <line x1="0" y1="63" x2="240" y2="63" stroke="#D4A574" stroke-width="2" opacity="0.35"/>
    <line x1="0" y1="64" x2="240" y2="64" stroke="#1A0D08" stroke-width="1"/>
    <text x="12" y="79" fill="#8A7A60" font-size="8" ${FF}>flow</text>
    <text x="12" y="96" fill="#D4A574" font-size="16" font-weight="700" ${FF}>${f.toFixed(1)}</text>
    <text x="60" y="96" fill="#D4A574" font-size="12" font-weight="600" ${FF}>g/s</text>
    <text x="228" y="79" text-anchor="end" fill="#8A7A60" font-size="8" ${FF}>time</text>
    <text x="228" y="96" text-anchor="end" fill="#D4A574" font-size="16" font-weight="700" ${FF}>${String(D.m).padStart(2,'0')}:${String(D.s).padStart(2,'0')}</text>
    <line x1="0" y1="104" x2="240" y2="104" stroke="#3A2A1A" stroke-width="1"/>
    <circle cx="12" cy="111" r="4" fill="${D.running?'#C4956A':'#3A2A1A'}"/>
    <text x="22" y="115" fill="${D.running?'#C4956A':'#5A4A3A'}" font-size="11" font-weight="600" letter-spacing="1" ${FF}>${D.running?'BREWING':'STANDBY'}</text>
    <polyline points="0,135 8,130 18,124 30,118 45,112 62,106 80,102 100,100 118,101 136,103 154,107 170,111 186,114 200,115 216,113 230,110 240,108"
      fill="none" stroke="#D4A574" stroke-width="2" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="135" x2="240" y2="135" stroke="#D4A574" stroke-width="0.5" opacity="0.15"/>
  </svg>`;
}

function weightCurve() {
  let pts="";
  for(let i=0;i<24;i++){let x=18+i*9.2;let y=115-(Math.sin(i*0.25+0.3)*35+Math.sin(i*0.08)*18+40);pts+=x.toFixed(1)+','+Math.max(28,Math.min(118,y)).toFixed(1)+' '}
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect width="${W}" height="${H}" fill="#24140D"/>
    <rect x="0" y="0" width="${W}" height="18" fill="#1A0D08"/>
    <text x="120" y="12" text-anchor="middle" fill="#D4A574" font-size="9" letter-spacing="1" ${FF}>WEIGHT</text>
    <circle cx="210" cy="9" r="2.5" fill="#D4A574"/><circle cx="222" cy="9" r="2.5" fill="#5A4A3A"/><circle cx="234" cy="9" r="2.5" fill="#5A4A3A"/>
    <line x1="0" y1="18" x2="240" y2="18" stroke="#D4A574" stroke-width="1.5" opacity="0.3"/>
    <line x1="18" y1="25" x2="18" y2="118" stroke="#3A2A1A" stroke-width="1.5"/>
    <line x1="18" y1="118" x2="235" y2="118" stroke="#3A2A1A" stroke-width="1.5"/>
    <line x1="18" y1="50" x2="235" y2="50" stroke="#2A1A10" stroke-width="0.5"/>
    <line x1="18" y1="85" x2="235" y2="85" stroke="#2A1A10" stroke-width="0.5"/>
    <text x="14" y="30" fill="#7A6A50" font-size="8" ${FF}>200</text>
    <text x="14" y="115" fill="#7A6A50" font-size="8" ${FF}>0</text>
    <polyline points="${pts}" fill="none" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="18" y="132" fill="#5A4A3A" font-size="8" ${FF}>0</text>
    <text x="235" y="132" text-anchor="end" fill="#5A4A3A" font-size="8" ${FF}>24s</text>
  </svg>`;
}

function flowCurve() {
  let pts="";
  for(let i=0;i<24;i++){let x=18+i*9.2;let y=118-(Math.sin(i*0.3+0.5)*18+Math.sin(i*0.06)*12+20);pts+=x.toFixed(1)+','+Math.max(32,Math.min(120,y)).toFixed(1)+' '}
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect width="${W}" height="${H}" fill="#24140D"/>
    <rect x="0" y="0" width="${W}" height="18" fill="#1A0D08"/>
    <text x="120" y="12" text-anchor="middle" fill="#D4A574" font-size="9" letter-spacing="1" ${FF}>FLOW</text>
    <circle cx="210" cy="9" r="2.5" fill="#D4A574"/><circle cx="222" cy="9" r="2.5" fill="#5A4A3A"/><circle cx="234" cy="9" r="2.5" fill="#5A4A3A"/>
    <line x1="0" y1="18" x2="240" y2="18" stroke="#D4A574" stroke-width="1.5" opacity="0.3"/>
    <line x1="18" y1="25" x2="18" y2="118" stroke="#3A2A1A" stroke-width="1.5"/>
    <line x1="18" y1="118" x2="235" y2="118" stroke="#3A2A1A" stroke-width="1.5"/>
    <line x1="18" y1="50" x2="235" y2="50" stroke="#2A1A10" stroke-width="0.5"/>
    <line x1="18" y1="85" x2="235" y2="85" stroke="#2A1A10" stroke-width="0.5"/>
    <text x="14" y="30" fill="#7A6A50" font-size="8" ${FF}>6</text>
    <text x="14" y="115" fill="#7A6A50" font-size="8" ${FF}>0</text>
    <polyline points="${pts}" fill="none" stroke="#FF8C42" stroke-width="2" stroke-linecap="round"/>
    <text x="18" y="132" fill="#5A4A3A" font-size="8" ${FF}>0</text>
    <text x="235" y="132" text-anchor="end" fill="#5A4A3A" font-size="8" ${FF}>24s</text>
  </svg>`;
}

function settings() {
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect width="${W}" height="${H}" fill="#24140D"/>
    <rect x="0" y="0" width="${W}" height="18" fill="#1A0D08"/>
    <text x="120" y="12" text-anchor="middle" fill="#D4A574" font-size="9" letter-spacing="1" ${FF}>SETTINGS</text>
    <circle cx="210" cy="9" r="2.5" fill="#D4A574"/><circle cx="222" cy="9" r="2.5" fill="#5A4A3A"/><circle cx="234" cy="9" r="2.5" fill="#5A4A3A"/>
    <line x1="0" y1="18" x2="240" y2="18" stroke="#D4A574" stroke-width="1.5" opacity="0.3"/>
    <rect x="8" y="24" width="224" height="24" rx="2" fill="#1A0D08"/>
    <text x="14" y="36" fill="#8A7A60" font-size="7" ${FF}>start</text>
    <text x="14" y="46" fill="#D4A574" font-size="10" font-weight="600" ${FF}>0.5 g</text>
    <text x="124" y="36" fill="#8A7A60" font-size="7" ${FF}>reset</text>
    <text x="124" y="46" fill="#D4A574" font-size="10" font-weight="600" ${FF}>0.3 g</text>
    <rect x="8" y="52" width="224" height="24" rx="2" fill="#1A0D08"/>
    <text x="14" y="64" fill="#8A7A60" font-size="7" ${FF}>factor</text>
    <text x="14" y="74" fill="#D4A574" font-size="10" font-weight="600" ${FF}>420.0</text>
    <rect x="8" y="80" width="224" height="20" rx="2" fill="#1A0D08"/>
    <text x="14" y="92" fill="#8A7A60" font-size="7" ${FF}>key</text>
    <text x="48" y="92" fill="#A0805A" font-size="8" ${FF}>1: page</text>
    <text x="124" y="92" fill="#A0805A" font-size="8" ${FF}>t: tare</text>
    <text x="120" y="130" text-anchor="middle" fill="#5A4A3A" font-size="7" ${FF}>[ 1 ] RETURN</text>
  </svg>`;
}

const views = [main, weightCurve, flowCurve, settings];
let currentPage = 0;
function showPage(idx) {
  currentPage = idx;
  document.querySelectorAll('#pageBtns .btn').forEach((b,i)=>{b.className='btn'+(i===idx?' active':'')});
  document.getElementById('screenB').innerHTML = views[idx]();
}
showPage(0);
</script>
</body>
</html>
