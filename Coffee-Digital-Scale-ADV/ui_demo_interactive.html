<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>咖啡秤 · 交互模拟 Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;font-family:Georgia,serif;color:#ccc;padding:30px;display:flex;flex-direction:column;align-items:center;gap:18px}
h1{font-size:15px;font-weight:400;color:#777;letter-spacing:.08em;text-align:center}
h1 strong{color:#eee;font-weight:500}
.sub{font-size:11px;color:#555;font-style:italic}

.screen-box{width:480px;height:270px;border-radius:6px;border:2px solid #2a2a35;overflow:hidden;background:#24140D;display:block;box-shadow:0 6px 30px rgba(0,0,0,0.6)}
.screen-box svg{display:block;width:480px;height:270px}

.controls-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:560px}
.btn{padding:10px 18px;border-radius:8px;border:1px solid #3a3a4a;background:#1e1e30;color:#bbb;cursor:pointer;font-size:12px;font-family:Georgia,serif;transition:all .15s;min-width:90px;text-align:center}
.btn:hover{background:#2a2a40;border-color:#D4A574;color:#eee}
.btn:active{transform:scale(.96)}
.btn.primary{background:#C4956A;border-color:#C4956A;color:#1a1a1a;font-weight:600}
.btn.primary:hover{background:#D4A574}
.btn.danger{background:#8a3a3a;border-color:#8a3a3a;color:#fff}
.btn.danger:hover{background:#a44a4a}
.btn:disabled{opacity:.4;cursor:not-allowed}

.status-row{display:flex;gap:20px;font-size:12px;color:#888;font-family:monospace;background:#1a1a24;padding:8px 16px;border-radius:8px;border:1px solid #2a2a35}
.status-row span em{color:#D4A574;font-style:normal}

.slider-row{display:flex;gap:12px;align-items:center;font-size:11px;color:#888;max-width:420px;width:100%}
.slider-row input{flex:1;accent-color:#C4956A;height:4px}
.slider-row .val{color:#D4A574;font-weight:600;min-width:30px;text-align:right}
</style>
</head>
<body>

<h1>☕ <strong>交互模拟 · 手冲咖啡秤</strong></h1>
<p class="sub">点击倒水按钮模拟注水 · 按 '1' 切换页面 · 自动计时 + 进度条 + 曲线</p>

<div class="screen-box" id="screenBox"></div>

<div class="controls-row">
  <div class="btn primary" id="btnPour" onclick="startPour()">⬇ 注水 5g/s</div>
  <div class="btn primary" onclick="startPourFast()">⬇⬇ 注水 10g/s</div>
  <div class="btn" onclick="stopPour()">⏹ 停止注水</div>
  <div class="btn" onclick="removeCup()">⬆ 移走杯子</div>
  <div class="btn danger" onclick="resetAll()">↺ 重置</div>
</div>

<div class="slider-row">
  <span>目标水量</span>
  <input type="range" id="targetSlider" min="50" max="500" value="225" step="5" oninput="setTarget(this.value)">
  <span class="val" id="targetVal">225</span><span>g</span>
</div>

<div class="status-row">
  <span>重量: <em id="sWeight">0.0</em> g</span>
  <span>流量: <em id="sFlow">0.0</em> g/s</span>
  <span>时间: <em id="sTime">00:00.0</em></span>
  <span>状态: <em id="sStatus">STOPPED</em></span>
  <span>目标: <em id="sTarget">225</em> g</span>
</div>

<div class="controls-row" style="gap:6px">
  <div class="btn" onclick="setPage(0)" style="font-size:10px;padding:6px 10px">主界面</div>
  <div class="btn" onclick="setPage(1)" style="font-size:10px;padding:6px 10px">重量曲线</div>
  <div class="btn" onclick="setPage(2)" style="font-size:10px;padding:6px 10px">流量曲线</div>
  <div class="btn" onclick="setPage(3)" style="font-size:10px;padding:6px 10px">设置</div>
  <span style="font-size:10px;color:#555"> | 键盘 1 切换</span>
</div>

<script>
// === 状态 ===
const W=480, H=270;
let weight=0, flow=0, time=0;
let running=false, targetReached=false, page=0;
let target=225, ratio=15, dose=15;
let points=[], flowPoints=[], timePoints=[];
let pourRate=0, timer=null;

const pageNames=['POUR OVER','WEIGHT','FLOW','SETTINGS'];
const pageIcons=['☕','📈','📊','⚙'];

// === 渲染 ===
function render(){
  let svg='';
  if(page===0) svg=drawMain();
  else if(page===1) svg=drawWeightCurve();
  else if(page===2) svg=drawFlowCurve();
  else svg=drawSettings();
  document.getElementById('screenBox').innerHTML=svg;
  updateStatus();
}

function drawMain(){
  let w=weight, f=flow;
  let pct=target>0?Math.min(w/target,1):0;
  let barW=Math.round(440*pct);
  let brewY=92-H(12);
  let curvePts=buildCurvePoints(false);
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect width="${W}" height="${H}" fill="#24140D"/>
    <rect x="0" y="0" width="${W}" height="32" fill="#1A0D08"/>
    <text x="240" y="24" text-anchor="middle" fill="#D4A574" font-size="16" letter-spacing="3" font-family="Georgia,serif">POUR OVER</text>
    <circle cx="420" cy="16" r="5" fill="#D4A574"/><circle cx="444" cy="16" r="5" fill="#5A4A3A"/><circle cx="468" cy="16" r="5" fill="#5A4A3A"/>
    <line x1="0" y1="32" x2="${W}" y2="32" stroke="#D4A574" stroke-width="2" opacity="0.25"/>
    <text x="240" y="90" text-anchor="middle" fill="#F5E6D0" font-size="56" font-weight="700" font-family="Georgia,serif">${w.toFixed(1)}</text>
    <rect x="20" y="116" width="440" height="6" rx="3" fill="#3A2A1A"/>
    <rect x="20" y="116" width="${barW}" height="6" rx="3" fill="#C4956A" opacity="0.85"/>
    <text x="10" y="146" fill="#D4A574" font-size="16" font-weight="600" font-family="Georgia,serif">flow ${f.toFixed(1)}</text>
    <text x="100" y="146" fill="#8A7A60" font-size="11" font-family="Georgia,serif">g/s</text>
    <text x="240" y="146" text-anchor="middle" fill="${targetReached?'#07E0':'#8A7A60'}" font-size="16" font-weight="600" font-family="Georgia,serif">${w.toFixed(0)}/${target}g</text>
    <text x="${W-10}" y="146" text-anchor="end" fill="#D4A574" font-size="16" font-weight="600" font-family="Georgia,serif">${formatTime(time)}</text>
    <line x1="0" y1="160" x2="${W}" y2="160" stroke="#3A2A1A" stroke-width="0.5"/>
    <circle cx="20" cy="${brewY}" r="5" fill="${running?'#C4956A':'#3A2A1A'}"/>
    <text x="34" y="${brewY+H(3)}" fill="${running?'#C4956A':'#5A4A3A'}" font-size="12" font-weight="600" letter-spacing="0.5" font-family="Georgia,serif">${running?'BREWING':'STANDBY'}</text>
    <polyline points="${curvePts}" fill="none" stroke="#D4A574" stroke-width="3" opacity="0.45" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="${H-2}" x2="${W}" y2="${H-2}" stroke="#D4A574" stroke-width="1" opacity="0.1"/>
  </svg>`;
}

function drawWeightCurve(){
  let pts=buildCurvePoints(false);
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect width="${W}" height="${H}" fill="#24140D"/>
    <rect x="0" y="0" width="${W}" height="32" fill="#1A0D08"/>
    <text x="240" y="24" text-anchor="middle" fill="#D4A574" font-size="16" letter-spacing="2" font-family="Georgia,serif">WEIGHT</text>
    <circle cx="420" cy="16" r="5" fill="#D4A574"/><circle cx="444" cy="16" r="5" fill="#5A4A3A"/><circle cx="468" cy="16" r="5" fill="#5A4A3A"/>
    <line x1="0" y1="32" x2="${W}" y2="32" stroke="#D4A574" stroke-width="1.5" opacity="0.3"/>
    <line x1="40" y1="45" x2="40" y2="240" stroke="#3A2A1A" stroke-width="2"/>
    <line x1="40" y1="240" x2="470" y2="240" stroke="#3A2A1A" stroke-width="2"/>
    <line x1="40" y1="95" x2="470" y2="95" stroke="#2A1A10" stroke-width="1"/>
    <line x1="40" y1="170" x2="470" y2="170" stroke="#2A1A10" stroke-width="1"/>
    <text x="30" y="50" fill="#7A6A50" font-size="12" font-family="Georgia,serif">200</text>
    <text x="30" y="238" fill="#7A6A50" font-size="12" font-family="Georgia,serif">0</text>
    <polyline points="${pts}" fill="none" stroke="#D4A574" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="262" fill="#5A4A3A" font-size="12" font-family="Georgia,serif">0</text>
    <text x="470" y="262" text-anchor="end" fill="#5A4A3A" font-size="12" font-family="Georgia,serif">${Math.max(1,Math.round(timePoints.length?timePoints[timePoints.length-1]-timePoints[0]:0))}s</text>
  </svg>`;
}

function drawFlowCurve(){
  let pts=buildCurvePoints(true);
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect width="${W}" height="${H}" fill="#24140D"/>
    <rect x="0" y="0" width="${W}" height="32" fill="#1A0D08"/>
    <text x="240" y="24" text-anchor="middle" fill="#D4A574" font-size="16" letter-spacing="2" font-family="Georgia,serif">FLOW</text>
    <circle cx="420" cy="16" r="5" fill="#D4A574"/><circle cx="444" cy="16" r="5" fill="#5A4A3A"/><circle cx="468" cy="16" r="5" fill="#5A4A3A"/>
    <line x1="0" y1="32" x2="${W}" y2="32" stroke="#D4A574" stroke-width="1.5" opacity="0.3"/>
    <line x1="40" y1="45" x2="40" y2="240" stroke="#3A2A1A" stroke-width="2"/>
    <line x1="40" y1="240" x2="470" y2="240" stroke="#3A2A1A" stroke-width="2"/>
    <line x1="40" y1="95" x2="470" y2="95" stroke="#2A1A10" stroke-width="1"/>
    <line x1="40" y1="170" x2="470" y2="170" stroke="#2A1A10" stroke-width="1"/>
    <text x="30" y="50" fill="#7A6A50" font-size="12" font-family="Georgia,serif">6</text>
    <text x="30" y="238" fill="#7A6A50" font-size="12" font-family="Georgia,serif">0</text>
    <polyline points="${pts}" fill="none" stroke="#FF8C42" stroke-width="3" stroke-linecap="round"/>
    <text x="40" y="262" fill="#5A4A3A" font-size="12" font-family="Georgia,serif">0</text>
    <text x="470" y="262" text-anchor="end" fill="#5A4A3A" font-size="12" font-family="Georgia,serif">${Math.max(1,Math.round(timePoints.length?timePoints[timePoints.length-1]-timePoints[0]:0))}s</text>
  </svg>`;
}

function drawSettings(){
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect width="${W}" height="${H}" fill="#24140D"/>
    <rect x="0" y="0" width="${W}" height="32" fill="#1A0D08"/>
    <text x="240" y="24" text-anchor="middle" fill="#D4A574" font-size="16" letter-spacing="2" font-family="Georgia,serif">SETTINGS</text>
    <circle cx="420" cy="16" r="5" fill="#D4A574"/><circle cx="444" cy="16" r="5" fill="#5A4A3A"/><circle cx="468" cy="16" r="5" fill="#5A4A3A"/>
    <line x1="0" y1="32" x2="${W}" y2="32" stroke="#D4A574" stroke-width="1.5" opacity="0.3"/>
    <rect x="16" y="42" width="448" height="52" rx="4" fill="#1A0D08" stroke="#3A2A1A" stroke-width="1"/>
    <text x="28" y="62" fill="#8A7A60" font-size="11" letter-spacing="1" font-family="Georgia,serif">RATIO</text>
    <text x="28" y="86" fill="#D4A574" font-size="20" font-weight="600" font-family="Georgia,serif">1:${ratio.toFixed(0)}</text>
    <text x="220" y="62" fill="#8A7A60" font-size="11" letter-spacing="1" font-family="Georgia,serif">DOSE</text>
    <text x="220" y="86" fill="#D4A574" font-size="20" font-weight="600" font-family="Georgia,serif">${dose.toFixed(0)} g</text>
    <text x="428" y="86" text-anchor="end" fill="#5A4A3A" font-size="11" font-family="Georgia,serif">[r] [d]</text>
    <rect x="16" y="100" width="448" height="42" rx="4" fill="#1A0D08" stroke="#3A2A1A" stroke-width="1"/>
    <text x="28" y="122" fill="#8A7A60" font-size="11" letter-spacing="1" font-family="Georgia,serif">TARGET WATER</text>
    <text x="${W-28}" y="122" text-anchor="end" fill="#D4A574" font-size="20" font-weight="600" font-family="Georgia,serif">${target} g</text>
    <rect x="16" y="148" width="448" height="36" rx="4" fill="#1A0D08" stroke="#3A2A1A" stroke-width="1"/>
    <text x="28" y="170" fill="#8A7A60" font-size="11" letter-spacing="1" font-family="Georgia,serif">CALIBRATION</text>
    <text x="160" y="170" fill="#A0805A" font-size="14" font-family="Georgia,serif">420.0</text>
    <text x="240" y="262" text-anchor="middle" fill="#5A4A3A" font-size="10" font-family="Georgia,serif">1:page  r:ratio  d:dose  =:confirm</text>
  </svg>`;
}

function H(px){return px*1.85;}

function buildCurvePoints(isFlow){
  if(points.length<2) return '';
  let data=isFlow?flowPoints:points;
  let n=data.length;
  let minV=Math.min(...data), maxV=Math.max(...data);
  if(maxV-minV<1){minV-=0.5;maxV+=0.5}
  let range=maxV-minV;
  if(range<0.01)range=1;
  return data.map((v,i)=>{
    let x=40+(i/(n-1||1))*420;
    let y=240-((v-minV)/range)*190;
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
}

function formatTime(t){
  let m=Math.floor(t/60), s=Math.floor(t%60), tenth=Math.floor((t*10)%10);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+tenth;
}

function updateStatus(){
  document.getElementById('sWeight').textContent=weight.toFixed(1);
  document.getElementById('sFlow').textContent=flow.toFixed(1);
  document.getElementById('sTime').textContent=formatTime(time);
  let stat=running?'BREWING':'STOPPED';
  document.getElementById('sStatus').textContent=stat;
  document.getElementById('sTarget').textContent=target;
}

// === 操作 ===
function startPour(){pourRate=5;if(!running){running=true;startTick()}}
function startPourFast(){pourRate=10;if(!running){running=true;startTick()}}
function stopPour(){pourRate=0}
function removeCup(){pourRate=0;weight=Math.max(0,weight-20);if(weight<0.3){running=false;time=0;flow=0;targetReached=false};render()}
function resetAll(){
  weight=0;flow=0;time=0;running=false;pourRate=0;targetReached=false;
  points=[];flowPoints=[];timePoints=[];
  render()
}
function setTarget(v){target=parseFloat(v);document.getElementById('targetVal').textContent=v;render()}
function setPage(p){page=p;render()}

let ticking=false;
function startTick(){
  if(ticking)return;
  ticking=true;
  let lastTick=performance.now();
  tick();
}

function tick(){
  if(running || pourRate>0){
    if(pourRate>0 && weight<500){
      let add=pourRate*0.04;
      weight=Math.min(weight+add,500);
      flow=pourRate;
      points.push(weight);
      flowPoints.push(flow);
      timePoints.push(time);
      if(!running){running=true}
    } else if(pourRate===0 && running && weight>=0.3){
    } else if(pourRate===0 && weight<0.3 && running){
      running=false;time=0;targetReached=false;
      ticking=false;render();
      document.getElementById('btnPour').disabled=false;
      return;
    }
    if(running) time+=0.04;
    if(running && weight>=target && !targetReached && target>0){
      targetReached=true;
      // 模拟声音提示
    }
    if(running && pourRate===0 && weight<0.3){
      running=false;time=0;targetReached=false;
    }
    render();
    requestAnimationFrame(tick);
  } else {
    ticking=false;
    document.getElementById('btnPour').disabled=false;
  }
}

// === 键盘 ===
document.addEventListener('keydown',function(e){
  if(e.key==='1'){setPage((page+1)%4);e.preventDefault()}
});

render();
</script>
</body>
</html>
